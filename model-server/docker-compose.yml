# ─── AMD-ROCm model-server stack ─────────────────────────────────────────────
# One-shot deploy of the trial-app's NeMo model-server on an AMD GPU box.
# Plan D Stage B2.
#
# Usage:
#   cd model-server
#   docker compose up -d
#   curl http://localhost:9100/health
#
# Then on the trial-app host (which can be the same machine):
#   export MODEL_SERVER_BACKEND=amd
#   export MODEL_SERVER_AMD_URL=http://localhost:9100   # or remote IP
#
# GPU access: the ROCm runtime needs /dev/kfd and /dev/dri exposed plus
# the `video` and `render` groups on the host. Most AMD distros add the
# user to those groups automatically; verify with:
#   getent group video render | grep $USER
#
# For consumer Navi cards (e.g. RX 7900 XTX) override HSA_OVERRIDE_GFX_VERSION:
#   HSA_OVERRIDE_GFX_VERSION=11.0.0 docker compose up -d
# MI300X / MI250X auto-detect — leave unset.
#
# CPU-only fallback (no AMD GPU present): comment out the `devices:` block
# below. NeMo / pyannote / Resemblyzer all degrade gracefully to CPU.

services:
  model-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override per host. Empty = MI300X auto-detect.
        HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-}
    image: audio-trial-model-server:rocm-${TAG:-latest}
    container_name: audio-trial-model-server
    restart: unless-stopped
    ports:
      - "${MODEL_SERVER_PORT:-9100}:9100"
    environment:
      # HF_TOKEN is needed for pyannote/canary gated repos. .env is auto-read.
      HF_TOKEN: ${HF_TOKEN:-}
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-}
      # Sets where models cache; matches Dockerfile ENV.
      HF_HOME: /models/hf_cache
      NEMO_CACHE_DIR: /models/nemo_cache
    volumes:
      # Persist downloaded NeMo + HF weights so re-runs don't re-fetch ~5 GB.
      - model-cache:/models
    # ── AMD ROCm device access ─────────────────────────────────────────────
    # Comment out this whole block to run CPU-only.
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    shm_size: 8g
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s   # first model-load can take ~60 s on cold weights

volumes:
  model-cache:
    name: audio-trial-model-cache
